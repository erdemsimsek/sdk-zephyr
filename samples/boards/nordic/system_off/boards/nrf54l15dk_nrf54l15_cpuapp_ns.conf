# Non-secure (TF-M) build: enable the secure System OFF + RAM-control services
# so RAM retention/power-down is routed to the secure domain.
CONFIG_TFM_SFN=y
CONFIG_TFM_NRF_SYSTEM_OFF_SERVICE=y
CONFIG_TFM_NRF_RAM_CTRL_SERVICE=y

# Verbose fault reporting (keep while bringing up / documenting).
CONFIG_EXCEPTION_DEBUG=y
CONFIG_FAULT_DUMP=2

# Retained state lives in a .noinit variable inside sram0_ns (MPU-accessible),
# not in a region carved above sram0_ns (which faults under TF-M; see overlay).
CONFIG_APP_RETAINED_NOINIT=y
